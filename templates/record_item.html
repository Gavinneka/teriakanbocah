{{define "record_item"}}
<tr class="bg-white hover:bg-gray-50 transition-colors">
    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{.Date.Format "2006-01-02"}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{.Room}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{.Unit}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
        {{if eq .Status "Selesai"}}bg-green-100 text-green-800{{else if eq .Status "Terjadwal"}}bg-blue-100 text-blue-800{{else}}bg-yellow-100 text-yellow-800{{end}}">
            {{.Status}}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{.Activity}}</td>
    <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate" title="{{.Notes}}">{{.Notes}}</td>
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
        <button hx-delete="/ac/records/{{.ID}}" 
                hx-target="closest tr" 
                hx-swap="outerHTML"
                hx-confirm="Yakin ingin menghapus catatan ini?"
                class="text-red-600 hover:text-red-900 font-semibold cursor-pointer">
            Hapus
        </button>
    </td>
</tr>
{{end}}
