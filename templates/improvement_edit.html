{{template "sidebar_layout.html" .}}

{{define "content"}}
<div class="max-w-xl mx-auto">

    <div class="mb-6">
        <a href="/improvement" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-blue-600 transition mb-4">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Kembali ke Daftar
        </a>
        <h1 class="text-xl font-bold text-gray-900">Edit Improvement</h1>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
        <form action="/improvement/edit/{{.Item.ID}}" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1.5">Nama Improvement <span class="text-red-500">*</span></label>
                <input type="text" name="title" required value="{{.Item.Title}}"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5">Estimasi Biaya (Rp)</label>
                    <input type="number" name="cost" min="0" value="{{.Item.Cost}}"
                        class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1.5">Status</label>
                    <select name="status" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition bg-white">
                        <option value="selesai" {{if eq .Item.Status "selesai"}}selected{{end}}>✅ Selesai</option>
                        <option value="proses" {{if eq .Item.Status "proses"}}selected{{end}}>🔄 Sedang Proses</option>
                        <option value="ditunda" {{if eq .Item.Status "ditunda"}}selected{{end}}>⏸️ Ditunda</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1.5">Tanggal Dilakukan</label>
                <input type="date" name="done_at"
                    value="{{if .Item.DoneAt}}{{.Item.DoneAt.Format "2006-01-02"}}{{end}}"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1.5">Catatan</label>
                <textarea name="notes" rows="3" placeholder="Detail singkat tentang improvement ini..."
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none">{{.Item.Notes}}</textarea>
            </div>

            <div class="flex justify-end gap-3 pt-2 border-t border-gray-100">
                <a href="/improvement"
                    class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 transition">Batal</a>
                <button type="submit"
                    class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition shadow cursor-pointer">
                    Simpan Perubahan
                </button>
            </div>
        </form>
    </div>

</div>
{{end}}
