{{define "form"}}
<form hx-post="/ac/records" hx-target="#record-list" hx-swap="prepend" hx-on::after-request="this.reset(); document.getElementById('room_custom_div').style.display='none';" class="bg-white shadow sm:rounded-lg p-6 mb-8 border border-gray-100">
    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
        <div class="sm:col-span-3">
            <label for="room" class="block text-sm font-medium text-gray-700">Ruangan</label>
            <div class="mt-1 flex gap-2 w-full">
                <select id="room_select" name="room_select" 
                        onchange="document.getElementById('room_custom_div').style.display = this.value === 'Lainnya' ? 'block' : 'none'; if(this.value!=='Lainnya') document.getElementById('room_custom').value='';"
                        class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                    <option value="" disabled selected>Pilih Ruangan</option>
                    <option value="Lab">Lab</option>
                    <option value="FO">FO</option>
                    <option value="Utama">Utama</option>
                    <option value="1.1 (Gudang)">1.1 (Gudang)</option>
                    <option value="1.2 (TTL)">1.2 (TTL)</option>
                    <option value="1.3 (Tempat Motor)">1.3 (Tempat Motor)</option>
                    <option value="2.1 (Ruang kelas)">2.1 (Ruang kelas)</option>
                    <option value="2.2 (Ruang kelas)">2.2 (Ruang kelas)</option>
                    <option value="2.3 (Ruang kelas)">2.3 (Ruang kelas)</option>
                    <option value="2.4 (Ruang kelas)">2.4 (Ruang kelas)</option>
                    <option value="2.5 (Ruang kelas)">2.5 (Ruang kelas)</option>
                    <option value="2.6 (Ruang kelas)">2.6 (Ruang kelas)</option>
                    <option value="3.1 (Aula)">3.1 (Aula)</option>
                    <option value="Lainnya">Lainnya...</option>
                </select>
            </div>
            <div id="room_custom_div" class="mt-2" style="display: none;">
                <input type="text" name="room_custom" id="room_custom" placeholder="Masukkan nama ruangan..." class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
            </div>
        </div>

        <div class="sm:col-span-3">
            <label for="unit" class="block text-sm font-medium text-gray-700">Unit AC / Model</label>
            <div class="mt-1">
                <input type="text" name="unit" id="unit" required placeholder="Contoh: Panasonic 1PK"
                    class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
            </div>
        </div>

        <div class="sm:col-span-2">
            <label for="activity" class="block text-sm font-medium text-gray-700">Kegiatan</label>
            <div class="mt-1">
                <select id="activity" name="activity" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                    <option>Cuci AC</option>
                    <option>Perbaikan</option>
                    <option>Isi Freon</option>
                    <option>Pengecekan</option>
                    <option>Pasang Baru</option>
                </select>
            </div>
        </div>

        <div class="sm:col-span-2">
            <label for="date" class="block text-sm font-medium text-gray-700">Tanggal</label>
            <div class="mt-1">
                <input type="date" name="date" id="date" required max="2100-12-31"
                    class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
            </div>
        </div>

        <div class="sm:col-span-2">
            <label for="status" class="block text-sm font-medium text-gray-700">Status</label>
            <div class="mt-1">
                <select id="status" name="status" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border">
                    <option value="Selesai">Selesai</option>
                    <option value="Terjadwal">Terjadwal</option>
                    <option value="Menunggu">Menunggu</option>
                </select>
            </div>
        </div>

        <div class="sm:col-span-6">
            <label for="notes" class="block text-sm font-medium text-gray-700">Catatan</label>
            <div class="mt-1">
                <textarea id="notes" name="notes" rows="3"
                    class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border"></textarea>
            </div>
        </div>
    </div>
    
    <div class="pt-5">
        <div class="flex justify-end">
            <button type="submit"
                class="ml-3 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Simpan
            </button>
        </div>
    </div>
</form>
{{end}}
